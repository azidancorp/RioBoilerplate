name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Ruff
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
        with:
          version: "0.15.12"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --require-hashes -r requirements-dev.txt

      - name: Audit dependencies
        run: |
          pip-audit --require-hashes -r requirements.txt
          pip-audit --require-hashes -r requirements-dev.txt

      - name: Generate runtime SBOM
        run: >-
          cyclonedx-py requirements requirements.txt
          --output-reproducible
          --output-format JSON
          --output-file sbom.cdx.json

      - name: Run tests
        run: pytest

      - name: Build verified release artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release build/wheelhouse
          python -m pip wheel \
            --require-hashes \
            --no-build-isolation \
            --wheel-dir build/wheelhouse \
            -r requirements.txt
          git archive HEAD | tar -x -C build/release
          cp sbom.cdx.json build/release/
          cp -a build/wheelhouse build/release/
          (
            cd build/release
            mv requirements.txt requirements-source.txt
            pip-compile \
              --no-index \
              --find-links wheelhouse \
              --generate-hashes \
              --strip-extras \
              --allow-unsafe \
              --resolver=backtracking \
              --output-file requirements.txt \
              requirements.in
          )
          python -m venv build/verify-venv
          build/verify-venv/bin/python -m pip install \
            --no-index \
            --find-links build/release/wheelhouse \
            --require-hashes \
            -r build/release/requirements.txt
          build/verify-venv/bin/python -m pip check
          PYTHONPATH=build/release/app \
            build/verify-venv/bin/python -c 'import app'
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          tar \
            --sort=name \
            --mtime="@${source_date_epoch}" \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -C build/release \
            -cf - . | gzip -n > build/rio-boilerplate-release.tar.gz
          (
            cd build
            sha256sum rio-boilerplate-release.tar.gz \
              > rio-boilerplate-release.tar.gz.sha256
          )

      - name: Upload verified release artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rio-boilerplate-${{ github.sha }}
          path: |
            build/rio-boilerplate-release.tar.gz
            build/rio-boilerplate-release.tar.gz.sha256
            sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
